<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/">🍳 Recipe Platform</a>
        <div>
            <a class="btn btn-outline-light me-2" href="/">Home</a>
            <a class="btn btn-light" href="/add">Add Recipe</a>
        </div>
    </div>
</nav>

<!-- Add Recipe Form -->
<section class="container my-5">
    <h2 class="text-center mb-4">Add New Recipe</h2>

    <form id="recipeForm" method="POST" style="max-width: 600px; margin: auto;">
        <div class="mb-3">
            <label class="form-label">Recipe Name</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Cooking Time</label>
            <input type="text" id="time" name="time" class="form-control" placeholder="e.g. 30 minutes" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Ingredients</label>
            <textarea id="ingredients" name="ingredients" class="form-control" rows="4" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Instructions</label>
            <textarea id="instructions" name="instructions" class="form-control" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Add Recipe</button>
        <a href="/" class="btn btn-secondary w-100 mt-2">Cancel</a>
    </form>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
    <p>&copy; 2024 Recipe Sharing Platform</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
